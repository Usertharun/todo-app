<!DOCTYPE html>
<html>
<head>
    <title>Premium To-Do App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            margin-top: 60px;
            transition: 0.3s;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #clearBtn {
            background-color: #f44336;
        }

        ul {
            margin-top: 20px;
            padding: 0;
        }

        li {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin: 10px auto;
            padding: 12px;
            width: 320px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        li button {
            background-color: red;
        }

        #stats {
            margin-top: 10px;
            font-weight: bold;
        }

        #emptyMsg {
            margin-top: 20px;
            color: #ddd;
        }

        /* Dark Mode */
        .dark {
            background: #121212;
        }

        .dark li {
            background: #1e1e1e;
        }

        .dark input {
            background: #2a2a2a;
            color: white;
            border: 1px solid #555;
        }

        /* Mobile */
        @media (max-width: 500px) {
            li {
                width: 90%;
            }

            input {
                width: 80%;
            }
        }
    </style>
</head>

<body>

    <h1>My To-Do List</h1>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button onclick="addTask()">Add</button>
    <button id="clearBtn" onclick="clearAll()">Clear All</button>
    <button onclick="toggleDarkMode()">🌙</button>

    <div>
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('completed')">Completed</button>
        <button onclick="filterTasks('pending')">Pending</button>
    </div>

    <p id="stats"></p>
    <p id="emptyMsg">No tasks yet 🚀</p>

    <ul id="taskList"></ul>

    <script>
        let tasks = [];

        window.onload = function () {
            tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            renderTasks(tasks);
        };

        function saveTasks() {
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function renderTasks(filteredTasks) {
            let list = document.getElementById("taskList");
            list.innerHTML = "";

            filteredTasks.forEach(task => {
                let li = document.createElement("li");

                let span = document.createElement("span");
                span.innerText = task.text;

                if (task.completed) {
                    span.style.textDecoration = "line-through";
                }

                span.onclick = function () {
                    task.completed = !task.completed;
                    saveTasks();
                    renderTasks(tasks);
                };

                let delBtn = document.createElement("button");
                delBtn.innerText = "❌";

                delBtn.onclick = function () {
                    tasks = tasks.filter(t => t.id !== task.id);
                    saveTasks();
                    renderTasks(tasks);
                };

                li.appendChild(span);
                li.appendChild(delBtn);

                list.appendChild(li);
            });

            updateStats();
            toggleEmptyMessage();
        }

        function addTask() {
            let input = document.getElementById("taskInput");
            let text = input.value.trim();

            if (!text) return;

            let exists = tasks.some(t => t.text.toLowerCase() === text.toLowerCase());

            if (exists) {
                alert("Task already exists!");
                input.value = "";
                return;
            }

            let newTask = {
                id: Date.now(),
                text: text,
                completed: false
            };

            tasks.push(newTask);
            saveTasks();
            renderTasks(tasks);

            input.value = "";
        }

        function clearAll() {
            tasks = [];
            saveTasks();
            renderTasks(tasks);
        }

        function updateStats() {
            let completed = tasks.filter(t => t.completed).length;

            document.getElementById("stats").innerText =
                `Total: ${tasks.length} | Completed: ${completed}`;
        }

        function toggleEmptyMessage() {
            document.getElementById("emptyMsg").style.display =
                tasks.length === 0 ? "block" : "none";
        }

        function filterTasks(type) {
            if (type === "all") {
                renderTasks(tasks);
            } else if (type === "completed") {
                renderTasks(tasks.filter(t => t.completed));
            } else {
                renderTasks(tasks.filter(t => !t.completed));
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle("dark");
        }

        document.getElementById("taskInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                addTask();
            }
        });
    </script>

</body>
</html>
