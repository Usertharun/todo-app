<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: 0.3s;
        }

        .container {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.7);
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            backdrop-filter: blur(10px);
        }

        button:active {
            transform: scale(0.95);
        }

        .addBtn { background: #007aff; color: white; }
        .clearBtn { background: #ff3b30; color: white; }
        .darkBtn { background: #8e8e93; color: white; }

        ul {
            padding: 0;
            margin-top: 15px;
        }

        li {
            list-style: none;
            margin: 10px 0;
            padding: 12px;
            border-radius: 15px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        li:hover {
            transform: scale(1.02);
        }

        li button {
            background: #ff3b30;
            color: white;
        }

        span {
            cursor: pointer;
            flex: 1;
            text-align: left;
        }

        #stats {
            margin-top: 10px;
            font-weight: bold;
        }

        #emptyMsg {
            color: gray;
        }

        /* Dark mode */
        .dark {
            background: #1c1c1e;
            color: white;
        }

        .dark .container {
            background: rgba(28,28,30,0.7);
        }

        .dark input {
            background: rgba(50,50,50,0.8);
            color: white;
        }

        .dark li {
            background: rgba(50,50,50,0.7);
        }

        @media(max-width:500px){
            .container { width: 90%; }
            input { width: 60%; }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>To-Do</h1>

    <input type="text" id="taskInput" placeholder="Add task">
    <button class="addBtn" onclick="addTask()">+</button>
    <button class="clearBtn" onclick="clearAll()">Clear</button>
    <button class="darkBtn" onclick="toggleDarkMode()">🌙</button>

    <div>
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('completed')">Done</button>
        <button onclick="filterTasks('pending')">Pending</button>
    </div>

    <p id="stats"></p>
    <p id="emptyMsg">No tasks yet 🚀</p>

    <ul id="taskList"></ul>

</div>

<script>
let tasks = [];

window.onload = function () {
    tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let dark = localStorage.getItem("darkMode");

    if (dark === "true") document.body.classList.add("dark");

    renderTasks(tasks);
};

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks(list) {
    let ul = document.getElementById("taskList");
    ul.innerHTML = "";

    list.forEach(task => {
        let li = document.createElement("li");

        let span = document.createElement("span");
        span.innerText = task.text;

        if (task.completed) {
            span.style.textDecoration = "line-through";
        }

        span.onclick = function () {
            task.completed = !task.completed;
            saveTasks();
            renderTasks(tasks);
        };

        span.ondblclick = function () {
            let newText = prompt("Edit task:", task.text);
            if (newText) {
                task.text = newText.trim();
                saveTasks();
                renderTasks(tasks);
            }
        };

        let del = document.createElement("button");
        del.innerText = "✕";

        del.onclick = function () {
            tasks = tasks.filter(t => t.id !== task.id);
            saveTasks();
            renderTasks(tasks);
        };

        li.appendChild(span);
        li.appendChild(del);

        ul.appendChild(li);
    });

    updateStats();
    toggleEmpty();
}

function addTask() {
    let input = document.getElementById("taskInput");
    let text = input.value.trim();

    if (!text) return;

    let exists = tasks.some(t => t.text.toLowerCase() === text.toLowerCase());
    if (exists) {
        alert("Duplicate task");
        input.value = "";
        return;
    }

    tasks.push({
        id: Date.now(),
        text: text,
        completed: false
    });

    saveTasks();
    renderTasks(tasks);
    input.value = "";
}

function clearAll() {
    tasks = [];
    saveTasks();
    renderTasks(tasks);
}

function updateStats() {
    let done = tasks.filter(t => t.completed).length;
    document.getElementById("stats").innerText =
        `Total: ${tasks.length} | Done: ${done}`;
}

function toggleEmpty() {
    document.getElementById("emptyMsg").style.display =
        tasks.length ? "none" : "block";
}

function filterTasks(type) {
    if (type === "all") renderTasks(tasks);
    else if (type === "completed") renderTasks(tasks.filter(t => t.completed));
    else renderTasks(tasks.filter(t => !t.completed));
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode",
        document.body.classList.contains("dark"));
}

document.getElementById("taskInput").addEventListener("keypress", e => {
    if (e.key === "Enter") addTask();
});
</script>

</body>
</html>
